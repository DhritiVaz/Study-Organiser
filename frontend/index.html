<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Study Organiser</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-title">Study Organiser</div>

        <nav class="nav">
            <button onclick="showView('home')" class="nav-item active">Home</button>
            <button onclick="showView('documents')" class="nav-item">Documents</button>
            <button onclick="showView('courses')" class="nav-item">Courses</button>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="main">

        <!-- HOME -->
        <section id="home" class="view active">
            <h1>Home</h1>
            <p class="muted">Your academic workspace</p>

            <div class="section">
                <p><strong>Courses:</strong> <span id="course-count">0</span></p>
                <p><strong>Documents:</strong> <span id="doc-count">0</span></p>
            </div>

            <div class="section">
                <h3>Recent activity</h3>
                <div id="activity-log" class="muted">No activity yet</div>
            </div>
        </section>

        <!-- DOCUMENTS -->
        <section id="documents" class="view">
            <h1>Documents</h1>

            <div class="section">
                <input type="file" id="file">
                <select id="course-select"></select>
                <button onclick="upload()">Upload</button>
            </div>

            <div class="section">
                <select id="doc-course-filter" onchange="filterDocuments()"></select>
                <div id="documents-list"></div>
            </div>
        </section>

        <!-- COURSES -->
        <section id="courses" class="view">
            <h1>Courses</h1>

            <div class="section">
                <input id="course-name" placeholder="Course name">
                <button onclick="addCourse()">Add course</button>
            </div>

            <div class="section" id="courses-list"></div>
        </section>

    </main>
</div>

<!-- SYLLABUS MODAL -->
<div id="syllabus-modal" class="modal hidden">
    <div class="modal-box">
        <h3 id="modal-title"></h3>
        <textarea id="syllabus-text" placeholder="Paste syllabus here..."></textarea>
        <div class="modal-actions">
            <button onclick="saveSyllabus()">Save</button>
            <button class="ghost" onclick="closeSyllabusModal()">Cancel</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
